name: Build and Publish bedtools

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: picotainers-local/bedtools:smoke

      - name: Smoke test
        run: |
          set -euo pipefail
          mkdir -p testdata
          cat > testdata/a.bed <<'A'
          chr1	1	10
          chr1	20	30
          A
          cat > testdata/b.bed <<'B'
          chr1	5	15
          B

          docker run --rm picotainers-local/bedtools:smoke --version > testdata/version.txt
          grep -Ei 'bedtools|v2\.31\.1|2\.31\.1' testdata/version.txt

          docker run --rm -v "$PWD/testdata:/data" picotainers-local/bedtools:smoke \
            intersect -a /data/a.bed -b /data/b.bed > testdata/intersect.out
          test -s testdata/intersect.out
          grep -q $'chr1\t5\t10' testdata/intersect.out

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: docker.io/picotainers/bedtools:latest

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
